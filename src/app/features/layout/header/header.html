<header class="header" [class.scrolled]="isScrolled()" [class.menu-open]="isMenuOpen()">
  <div class="nav-container">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo-icon">✈</span>
      <span class="logo-text">Travgo</span>
    </a>

    <!-- Mobile Hamburger Toggle -->
    <button class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen()" aria-label="Toggle navigation menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <!-- Navigation links -->
    <nav class="nav-links" [class.open]="isMenuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="closeMenu()">Home</a>
      <a routerLink="/tours" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Destinations</a>
      <a routerLink="/bookings" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Packages</a>
      <a routerLink="/" fragment="about" class="nav-link" (click)="closeMenu()">About</a>
      <a routerLink="/" fragment="contact" class="nav-link" (click)="closeMenu()">Contact</a>
      
      <!-- Right Enquire Button -->
      <a routerLink="/bookings" class="btn-enquire" (click)="closeMenu()">
        Enquire Now
        @if (bookingCount() > 0) {
          <span class="badge">{{ bookingCount() }}</span>
        }
      </a>
    </nav>
  </div>
</header>
